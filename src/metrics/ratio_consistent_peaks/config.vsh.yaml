# The API specifies which type of component this is.
# It contains specifications for:
#   - The input/output files
#   - Common parameters
#   - A unit test
__merge__: ../../api/comp_metric.yaml

# A unique identifier for your component (required).
# Can contain only lowercase letters or underscores.
name: ratio_consistent_peaks

# Metadata for your component
info:
  metrics:
      # A unique identifier for your metric (required).
      # Can contain only lowercase letters or underscores.
    - name: ratio_consistent_peaks
      label: Ratio Consistent Peaks
      summary: "Ratio of the number of cell‑type marker‑expression peaks between unintegrated and batch-integrated data."
      description: |
        The metric compares the number of cell type specific marker expression peaks between unintegrated and batch integrated data.
        The number of peaks is calculated using the `scipy.signal.find_peaks` function.
        The (cell type) marker expression profiles are first smoothed using kernel density estimation (KDE) (`scipy.stats.gaussian_kde`),
        and then peaks are identified using the `scipy.signal.find_peaks` function.
        For peak calling, the `prominence` parameter is set to 0.1 and the `height` parameter is set to 0.05*max_density.
        
        Case Definitions:
        - Case 1: Consistent peaks in both unintegrated AND integrated data (ideal outcome).
          Example: A marker shows 2 peaks for both splits in unintegrated AND integrated data.
        - Case 2: Consistent peaks in unintegrated data but inconsistent between integrated data and unintegrated data
          in each split (problematic - batch integration introduced inconsistency).
          Batch correction broke the consistency. 
          Example 1: A marker shows 2 peaks in both unintegrated splits, but after integration shows 2 peaks in split 1 
          and 1 peak in split 2. 
          Example 2: A marker shows 2 peaks in both unintegrated splits, but after integration shows 1 peak in both splits
        - Case NGT: Inconsistent peaks in unintegrated data, consistent in integrated data (excluded from metric) 
          OR inconsistent peaks in both unintegrated AND integrated data (excluded from metric).
          These cases are excluded from calculation because there are differences in unintegrated that cannot be accounted for.
          Example: A marker is inconsistent in unintegrated data (2 and 3 peaks in split 1 and split 2) and 
          is either inconsistent after integration (1 and 2 peaks in split 1 and split 2) or 
          consistent after integration (2 peaks in both split 1 and split 2).
        
        Ratio of consistent peaks is defined as the number of Case 1 occurrences divided by the total of Case 1 and Case 2 occurrences.
        Cases NGT (where unintegrated data has inconsistent peaks) are excluded from the denominator, but is reported
        in the final anndata output for diagnostic.
        A higher score indicates better performance, meaning there are fewer cases with inconsistent peaks after batch integration.
        
        For edge cases where methods return only zero values for a given marker/donor/cell type, but is not the 
        case in the unintegrated data, it is automatically assigned as Case 2.
      
      references:
        doi: 
          - 10.1038/s41592-019-0686-2
      links:
        # URL to the documentation for this metric (required).
        documentation: https://docs.scipy.org/doc/scipy/reference/generated/scipy.signal.find_peaks.html#scipy.signal.find_peaks
        # URL to the code repository for this metric (required).
        repository: https://github.com/scipy/scipy/blob/v1.15.2/scipy/signal/_peak_finding.py#L0-L1
      # The minimum possible value for this metric (required)
      min: 0
      # The maximum possible value for this metric (required)
      max: 1
      # Whether a higher value represents a 'better' solution (required)
      maximize: true

# Resources required to run the component
resources:
  # The script of your component (required)
  - type: python_script
    path: script.py
  - path: helper.py
  - path: /src/utils/helper_functions.py

engines:
  # Specifications for the Docker image for this component.
  - type: docker
    image: openproblems/base_python:1
    setup:
      - type: python
        packages:
          - scikit-tda

runners:
  # This platform allows running the component natively
  - type: executable
  # Allows turning the component into a Nextflow module / pipeline.
  - type: nextflow
    directives:
      label: [midtime,midmem,midcpu]
